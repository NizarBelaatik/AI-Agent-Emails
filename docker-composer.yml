version: '3.8'

services:
  # PostgreSQL Database for Odoo source
  postgres:
    image: postgres:15-alpine
    container_name: email_dispatcher_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${SOURCE_DB_NAME:-odoo_test_full}
      - POSTGRES_USER=${SOURCE_DB_USER:-auto_mail_user}
      - POSTGRES_PASSWORD=${SOURCE_DB_PASSWORD:-odoo}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - email_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_DB_USER:-auto_mail_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: email_dispatcher_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - email_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build: ./backend
    container_name: email_dispatcher_backend
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./backend:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,192.168.1.39}
      - SOURCE_DB_NAME=${SOURCE_DB_NAME:-odoo_test_full}
      - SOURCE_DB_USER=${SOURCE_DB_USER:-auto_mail_user}
      - SOURCE_DB_PASSWORD=${SOURCE_DB_PASSWORD:-odoo}
      - SOURCE_DB_HOST=${SOURCE_DB_HOST:-postgres}
      - SOURCE_DB_PORT=${SOURCE_DB_PORT:-5432}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TURBOSMTP_CONSUMER_KEY=${TURBOSMTP_CONSUMER_KEY}
      - TURBOSMTP_CONSUMER_SECRET=${TURBOSMTP_CONSUMER_SECRET}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-contact@bmm.ma}
      - DEFAULT_REPLY_TO=${DEFAULT_REPLY_TO:-contact@bmm.ma}
      - DEFAULT_FROM_NAME=${DEFAULT_FROM_NAME:-BMM}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://192.168.1.39:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - email_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  # Celery Worker
  celery:
    build: ./backend
    container_name: email_dispatcher_celery
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - SOURCE_DB_NAME=${SOURCE_DB_NAME:-odoo_test_full}
      - SOURCE_DB_USER=${SOURCE_DB_USER:-auto_mail_user}
      - SOURCE_DB_PASSWORD=${SOURCE_DB_PASSWORD:-odoo}
      - SOURCE_DB_HOST=${SOURCE_DB_HOST:-postgres}
      - SOURCE_DB_PORT=${SOURCE_DB_PORT:-5432}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TURBOSMTP_CONSUMER_KEY=${TURBOSMTP_CONSUMER_KEY}
      - TURBOSMTP_CONSUMER_SECRET=${TURBOSMTP_CONSUMER_SECRET}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-contact@bmm.ma}
      - DEFAULT_REPLY_TO=${DEFAULT_REPLY_TO:-contact@bmm.ma}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://192.168.1.39:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      - backend
      - redis
    networks:
      - email_network
    command: celery -A backend worker --loglevel=info --concurrency=2

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build: ./backend
    container_name: email_dispatcher_celery_beat
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - SOURCE_DB_NAME=${SOURCE_DB_NAME:-odoo_test_full}
      - SOURCE_DB_USER=${SOURCE_DB_USER:-auto_mail_user}
      - SOURCE_DB_PASSWORD=${SOURCE_DB_PASSWORD:-odoo}
      - SOURCE_DB_HOST=${SOURCE_DB_HOST:-postgres}
      - SOURCE_DB_PORT=${SOURCE_DB_PORT:-5432}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - backend
      - redis
    networks:
      - email_network
    command: celery -A backend beat --loglevel=info

  # React Frontend
  frontend:
    build: ./frontend
    container_name: email_dispatcher_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - email_network

networks:
  email_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: