version: '3.9'

services:

  backend:
    build: ./backend
    container_name: django_backend
    ports:
      - "8000:8000"
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - celery
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/email-generation/dashboard/stats/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build: ./backend
    container_name: celery_worker
    command: celery -A backend worker --loglevel=info
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend                # project root
      dockerfile: Dockerfile
    container_name: react_frontend
    networks:
      - app_network

  nginx:
    build:
      context: ./frontend    # same folder
      dockerfile: Dockerfile.nginx
    container_name: nginx_server
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app_network
    #restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    #ports:
      #- "6379:6379"
    networks:
      - app_network

networks:
  app_network: